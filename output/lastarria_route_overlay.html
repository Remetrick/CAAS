<!doctype html>
<html lang="es">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>Barrio Lastarria - Ruta</title>
  <style>
    :root { --w: 1536; --h: 1152; }
    body {
      margin: 0;
      font-family: Inter, Arial, sans-serif;
      background: #0f172a;
      color: #e2e8f0;
      display: grid;
      min-height: 100vh;
      place-items: center;
      gap: 14px;
      padding: 16px;
      box-sizing: border-box;
    }
    .wrap { width: min(96vw, calc(var(--w) * 1px)); }
    .frame {
      position: relative;
      width: 100%;
      aspect-ratio: calc(var(--w) / var(--h));
      border-radius: 14px;
      overflow: hidden;
      box-shadow: 0 20px 50px rgba(0,0,0,.45);
      background: #111827;
    }
    #baseMap {
      position: absolute;
      inset: 0;
      width: 100%;
      height: 100%;
      object-fit: cover;
      user-select: none;
      -webkit-user-drag: none;
    }
    #routeLayer {
      position: absolute;
      inset: 0;
      width: 100%;
      height: 100%;
      pointer-events: none;
    }
    .hud {
      display: flex;
      gap: 10px;
      justify-content: flex-end;
      margin-top: 10px;
      flex-wrap: wrap;
    }
    button {
      border: 0;
      border-radius: 10px;
      padding: 10px 14px;
      font-weight: 700;
      cursor: pointer;
      background: #f59e0b;
      color: #111827;
    }
    .note {
      font-size: 13px;
      opacity: .9;
      margin-top: 8px;
      line-height: 1.4;
    }
    code { background: rgba(148,163,184,.2); padding: 2px 6px; border-radius: 6px; }
  </style>
</head>
<body>
  <div class="wrap">
    <div class="frame" id="frame">
      <!-- IMPORTANTE: coloca aquí la imagen de referencia EXACTA -->
      <img id="baseMap" src="./lastarria_reference.png" alt="Mapa de referencia Barrio Lastarria" />

      <!-- Capa de ruta, sin mover calles/edificios ni marcadores del mapa base -->
      <svg id="routeLayer" viewBox="0 0 1536 1152" xmlns="http://www.w3.org/2000/svg" aria-label="Ruta turística">
        <defs>
          <filter id="routeGlow" x="-50%" y="-50%" width="200%" height="200%">
            <feGaussianBlur stdDeviation="5" result="b"/>
            <feMerge>
              <feMergeNode in="b"/>
              <feMergeNode in="SourceGraphic"/>
            </feMerge>
          </filter>
        </defs>

        <!--
          Ruta solicitada (orden exacto):
          1) Bar Liguria Lastarria
          2) Papacheco
          3) Iglesia de la Veracruz
          4) Sube hacia Parque Forestal
          5) Avanza por el borde del parque hasta Palacio Bruna
          6) Horizontal por Merced hacia la izquierda
          7) Termina en Museo Nacional de Bellas Artes
        -->
        <path
          d="M 876 502
             C 895 575, 910 642, 920 726
             C 930 806, 970 870, 988 922
             C 942 830, 935 690, 982 560
             C 1020 455, 1085 372, 1094 334
             C 1138 335, 1192 329, 1230 322
             C 1110 325, 970 328, 820 331
             C 660 333, 465 333, 295 336"
          fill="none"
          stroke="#f6a500"
          stroke-width="14"
          stroke-linecap="round"
          stroke-linejoin="round"
          stroke-dasharray="17 12"
          filter="url(#routeGlow)"
          opacity="0.96"
        />
      </svg>
    </div>

    <div class="hud">
      <button id="downloadPng">Descargar PNG</button>
    </div>

    <p class="note">
      Para mantener la geografía <strong>100% idéntica</strong>, este HTML usa la imagen base
      <code>output/lastarria_reference.png</code> y solo superpone la ruta. Si tu archivo tiene otro nombre,
      cambia el atributo <code>src</code> de <code>#baseMap</code>.
    </p>
  </div>

  <script>
    const downloadBtn = document.getElementById('downloadPng');
    const baseMap = document.getElementById('baseMap');
    const routeLayer = document.getElementById('routeLayer');

    function svgToDataUrl(svgEl) {
      const xml = new XMLSerializer().serializeToString(svgEl);
      return 'data:image/svg+xml;charset=utf-8,' + encodeURIComponent(xml);
    }

    async function renderCompositeToCanvas() {
      const canvas = document.createElement('canvas');
      canvas.width = 1536;
      canvas.height = 1152;
      const ctx = canvas.getContext('2d');

      await new Promise((resolve, reject) => {
        if (baseMap.complete && baseMap.naturalWidth > 0) return resolve();
        baseMap.onload = () => resolve();
        baseMap.onerror = () => reject(new Error('No se pudo cargar lastarria_reference.png'));
      });

      ctx.drawImage(baseMap, 0, 0, canvas.width, canvas.height);

      const routeImg = new Image();
      routeImg.src = svgToDataUrl(routeLayer);
      await new Promise((resolve, reject) => {
        routeImg.onload = () => resolve();
        routeImg.onerror = () => reject(new Error('No se pudo renderizar capa SVG'));
      });

      ctx.drawImage(routeImg, 0, 0, canvas.width, canvas.height);
      return canvas;
    }

    downloadBtn.addEventListener('click', async () => {
      try {
        const canvas = await renderCompositeToCanvas();
        const a = document.createElement('a');
        a.href = canvas.toDataURL('image/png');
        a.download = 'barrio_lastarria_ruta.png';
        a.click();
      } catch (err) {
        alert(err.message + '\n\nColoca la imagen base en: output/lastarria_reference.png');
      }
    });
  </script>
</body>
</html>
