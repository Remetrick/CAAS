<svg xmlns="http://www.w3.org/2000/svg" width="1536" height="1152" viewBox="0 0 1536 1152">
  <defs>
    <filter id="paper" x="-20%" y="-20%" width="140%" height="140%">
      <feTurbulence type="fractalNoise" baseFrequency="0.9" numOctaves="2" stitchTiles="stitch"/>
      <feColorMatrix type="saturate" values="0.2"/>
      <feComponentTransfer>
        <feFuncA type="table" tableValues="0 0.04"/>
      </feComponentTransfer>
    </filter>
    <filter id="glow" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="6" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
    <style>
      .road{stroke:#aeb5c2;stroke-width:18;fill:none;stroke-linecap:round;opacity:.95}
      .minor{stroke:#b8bec9;stroke-width:12;fill:none;stroke-linecap:round;opacity:.9}
      .block{fill:#f2f0f2;stroke:#ddd9de;stroke-width:2}
      .label{font-family:Arial,Helvetica,sans-serif;fill:#374151}
      .title{font-family:Arial,Helvetica,sans-serif;fill:#b54d2d;font-weight:700;letter-spacing:.5px}
      .pill{fill:#efe7d7;stroke:#8b8575;stroke-width:2}
      .route{fill:none;stroke:#f7a724;stroke-width:16;stroke-linecap:round;stroke-linejoin:round;stroke-dasharray:18 14;filter:url(#glow)}
      .photoRing{fill:#f4f3ee;stroke:#d77f54;stroke-width:6}
    </style>
  </defs>

  <rect width="1536" height="1152" fill="#ece8ed"/>
  <rect width="1536" height="1152" filter="url(#paper)"/>

  <!-- top park -->
  <rect x="170" y="108" width="1190" height="188" fill="#bfe6d2" stroke="#8ac3aa" stroke-width="3"/>
  <path d="M190 202 C420 126, 670 264, 880 186 S1250 145, 1325 214" stroke="#d8f0e4" stroke-width="10" fill="none" opacity=".7"/>

  <!-- street network -->
  <path class="road" d="M0 140 L1536 72"/>
  <path class="road" d="M0 338 L1536 268"/>
  <path class="road" d="M0 492 L1536 396"/>
  <path class="road" d="M0 670 L1536 532"/>
  <path class="road" d="M0 840 L1536 680"/>
  <path class="road" d="M0 1020 L1536 860"/>
  <path class="minor" d="M260 0 L430 1152"/>
  <path class="minor" d="M560 0 L730 1152"/>
  <path class="minor" d="M900 0 L1040 1152"/>
  <path class="minor" d="M1220 0 L1370 1152"/>

  <!-- blocks texture -->
  <g opacity=".45">
    <rect class="block" x="210" y="332" width="245" height="120"/>
    <rect class="block" x="475" y="332" width="245" height="120"/>
    <rect class="block" x="740" y="332" width="245" height="120"/>
    <rect class="block" x="1005" y="332" width="245" height="120"/>
    <rect class="block" x="260" y="500" width="265" height="130"/>
    <rect class="block" x="545" y="500" width="265" height="130"/>
    <rect class="block" x="830" y="500" width="265" height="130"/>
    <rect class="block" x="1115" y="500" width="265" height="130"/>
    <rect class="block" x="315" y="680" width="285" height="140"/>
    <rect class="block" x="620" y="680" width="285" height="140"/>
    <rect class="block" x="925" y="680" width="285" height="140"/>
    <rect class="block" x="380" y="865" width="300" height="150"/>
    <rect class="block" x="700" y="865" width="300" height="150"/>
    <rect class="block" x="1020" y="865" width="300" height="150"/>
  </g>

  <!-- route -->
  <path class="route" d="M846 444
                        C846 490, 846 548, 846 598
                        C846 650, 847 714, 847 766
                        C847 676, 935 600, 980 520
                        C1025 440, 1060 355, 1074 320
                        C1120 320, 1170 318, 1218 312
                        C1130 314, 985 316, 848 318
                        C690 320, 440 325, 286 316"/>

  <!-- text labels -->
  <text x="690" y="200" class="label" font-size="64" text-anchor="middle">parque</text>
  <text x="690" y="268" class="label" font-size="64" text-anchor="middle">forestal</text>
  <text x="640" y="612" class="title" font-size="68" text-anchor="middle">barrio</text>
  <text x="640" y="688" class="title" font-size="68" text-anchor="middle">lastarria</text>
  <text x="1278" y="232" class="label" font-size="48" transform="rotate(-12 1278 232)">Merced</text>

  <!-- Museo marker -->
  <ellipse class="photoRing" cx="342" cy="288" rx="150" ry="88"/>
  <rect x="190" y="322" width="360" height="102" rx="26" class="pill"/>
  <text x="370" y="378" class="label" font-size="50" text-anchor="middle">Museo Nacional</text>
  <text x="370" y="426" class="label" font-size="50" text-anchor="middle">de Bellas Artes</text>

  <!-- Palacio marker -->
  <ellipse class="photoRing" cx="1132" cy="228" rx="148" ry="84"/>
  <rect x="1042" y="286" width="330" height="86" rx="24" class="pill"/>
  <text x="1207" y="344" class="label" font-size="52" text-anchor="middle">Palacio Bruna</text>

  <!-- Bar Liguria marker -->
  <ellipse class="photoRing" cx="848" cy="430" rx="126" ry="70"/>
  <rect x="780" y="458" width="360" height="116" rx="26" class="pill"/>
  <text x="962" y="516" class="label" font-size="50" text-anchor="middle">Bar Liguria</text>
  <text x="962" y="566" class="label" font-size="50" text-anchor="middle">Lastarria</text>

  <!-- Papacheco marker -->
  <ellipse class="photoRing" cx="944" cy="644" rx="140" ry="78"/>
  <rect x="834" y="676" width="330" height="86" rx="24" class="pill"/>
  <text x="999" y="734" class="label" font-size="52" text-anchor="middle">Papacheco</text>

  <!-- Iglesia marker -->
  <ellipse class="photoRing" cx="980" cy="864" rx="170" ry="96"/>
  <rect x="866" y="900" width="360" height="110" rx="30" class="pill"/>
  <text x="1046" y="958" class="label" font-size="52" text-anchor="middle">Iglesia de la</text>
  <text x="1046" y="1008" class="label" font-size="52" text-anchor="middle">Veracruz</text>

  <!-- simplified map pins -->
  <g>
    <path d="M245 335 C245 300,292 300,292 335 C292 364,269 387,269 387 C269 387,245 364,245 335 Z" fill="#f29a5f" stroke="#a86539" stroke-width="3"/>
    <circle cx="269" cy="334" r="27" fill="#fff"/><circle cx="269" cy="334" r="12" fill="#f4c63f"/>

    <path d="M1030 282 C1030 247,1077 247,1077 282 C1077 311,1054 334,1054 334 C1054 334,1030 311,1030 282 Z" fill="#f29a5f" stroke="#a86539" stroke-width="3"/>
    <circle cx="1054" cy="281" r="27" fill="#fff"/><circle cx="1054" cy="281" r="12" fill="#f4c63f"/>

    <path d="M832 498 C832 463,879 463,879 498 C879 527,856 550,856 550 C856 550,832 527,832 498 Z" fill="#f29a5f" stroke="#a86539" stroke-width="3"/>
    <circle cx="856" cy="497" r="27" fill="#fff"/><circle cx="856" cy="497" r="12" fill="#f4c63f"/>

    <path d="M905 706 C905 671,952 671,952 706 C952 735,929 758,929 758 C929 758,905 735,905 706 Z" fill="#f29a5f" stroke="#a86539" stroke-width="3"/>
    <circle cx="929" cy="705" r="27" fill="#fff"/><circle cx="929" cy="705" r="12" fill="#f4c63f"/>

    <path d="M962 886 C962 851,1009 851,1009 886 C1009 915,986 938,986 938 C986 938,962 915,962 886 Z" fill="#f29a5f" stroke="#a86539" stroke-width="3"/>
    <circle cx="986" cy="885" r="27" fill="#fff"/><circle cx="986" cy="885" r="12" fill="#f4c63f"/>
  </g>
</svg>
